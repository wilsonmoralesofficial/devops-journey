services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secreto
      - POSTGRES_DB=midb
    volumes:
      - datos_db:/var/lib/postgresql/data

volumes:
  datos_db:
